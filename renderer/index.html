<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'">
  <title>Localhost Dashboard</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/components.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>Localhost Dashboard</h1>
      <div class="header-controls">
        <input type="text" id="filter-input" placeholder="Filter processes..." autocomplete="off">
        <button id="settings-btn" class="settings-btn" title="Settings">&#9881;</button>
      </div>
    </header>
    <div id="profile-panel-container"></div>
    <main id="process-groups"></main>
    <footer id="status-bar"></footer>
  </div>
  <div id="confirm-modal" class="modal hidden">
    <div class="modal-content">
      <p id="confirm-message"></p>
      <div class="modal-actions">
        <button id="confirm-yes" class="btn btn-danger">Kill</button>
        <button id="confirm-no" class="btn btn-secondary">Cancel</button>
      </div>
    </div>
  </div>
  <div id="batch-confirm-modal" class="modal hidden">
    <div class="modal-content batch-confirm-content">
      <p id="batch-confirm-title" class="batch-confirm-title"></p>
      <div id="batch-confirm-list" class="batch-confirm-list"></div>
      <div class="modal-actions">
        <button id="batch-confirm-yes" class="btn btn-danger">Kill All</button>
        <button id="batch-confirm-no" class="btn btn-secondary">Cancel</button>
      </div>
    </div>
  </div>
  <script src="js/utils/dom.js"></script>
  <script src="js/utils/format.js"></script>
  <script src="js/state.js"></script>
  <script src="js/components/group-header.js"></script>
  <script src="js/components/sparkline.js"></script>
  <script src="js/components/context-menu.js"></script>
  <script src="js/components/process-table.js"></script>
  <script src="js/components/container-table.js"></script>
  <script src="js/components/kill-button.js"></script>
  <script src="js/components/status-bar.js"></script>
  <script src="js/components/settings.js"></script>
  <script src="js/components/profile-panel.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
