name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          # The tests only exercise pure parsing logic; skip the Electron binary.
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Run tests
        run: npm test
